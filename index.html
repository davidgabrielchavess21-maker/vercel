<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>David | Dev</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #f0f0f0;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 700px;
            padding: 20px;
        }

        /* Abas */
        .tabs {
            display: flex;
            gap: 8px;
            background: #14141a;
            padding: 6px;
            border-radius: 40px;
            margin-bottom: 30px;
            border: 1px solid #2a2a35;
        }

        .tab {
            flex: 1;
            padding: 10px 16px;
            border: none;
            background: transparent;
            color: #9ca3af;
            font-size: 15px;
            cursor: pointer;
            border-radius: 30px;
            transition: 0.2s;
        }

        .tab:hover {
            color: white;
            background: #2a2a35;
        }

        .tab.active {
            background: #8b5cf6;
            color: white;
        }

        .tab-content {
            display: none;
            animation: fade 0.3s;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fade {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero {
            text-align: center;
            padding: 20px 0;
        }

        .hero h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ffffff, #c4b5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero h1 span {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            color: #9ca3af;
            font-size: 1.1rem;
            margin-bottom: 25px;
        }

        .discord-box {
            background: #14141a;
            border: 1px solid #2a2a35;
            border-radius: 50px;
            padding: 12px 20px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
            margin: 15px 0;
        }

        .discord-box:hover {
            border-color: #8b5cf6;
            background: #1e1e28;
        }

        .discord-name {
            font-size: 1rem;
            font-weight: 600;
            color: white;
        }

        .services {
            background: #14141a;
            border: 1px solid #2a2a35;
            border-radius: 24px;
            padding: 25px;
            margin: 25px 0;
        }

        .services h3 {
            color: #8b5cf6;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .service-item {
            background: #1e1e28;
            border-radius: 16px;
            padding: 15px 10px;
            text-align: center;
            border: 1px solid #2a2a35;
        }

        .service-icon {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .service-item span {
            font-size: 0.9rem;
            color: #cbd5e1;
        }

        .project-card {
            background: #14141a;
            border: 1px solid #2a2a35;
            border-radius: 20px;
            padding: 20px;
            margin: 10px 0 20px;
        }

        .project-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .project-icon {
            font-size: 2rem;
            background: #1e1e28;
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #2a2a35;
        }

        .project-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
        }

        .project-tech {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 12px 0;
        }

        .project-tech span {
            background: #1e1e28;
            border: 1px solid #2a2a35;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #c4b5fd;
        }

        .project-link {
            color: #8b5cf6;
            text-decoration: none;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 8px;
        }

        .project-link:hover {
            color: #a78bfa;
        }

        /* FOOTER CORRIGIDO - CENTRALIZADO */
        .footer {
            text-align: center;
            padding: 30px 0 10px;
            color: #666;
            font-size: 0.9rem;
            width: 100%;
            margin-top: 30px;
            border-top: 1px solid rgba(139, 92, 246, 0.1);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2e1065;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            z-index: 1001;
            border: 1px solid #8b5cf6;
            animation: slide 0.3s;
        }

        @keyframes slide {
            from { transform: translateX(-50%) translateY(20px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        @media (max-width: 500px) {
            .services-grid { grid-template-columns: 1fr; }
            .hero h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <!-- Áudio automático -->
    <audio id="bgMusic" loop autoplay>
        <source src="https://files.catbox.moe/76644s.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <!-- Abas -->
        <div class="tabs">
            <button class="tab active" onclick="openTab(event, 'home')">Início</button>
            <button class="tab" onclick="openTab(event, 'projects')">Projetos</button>
        </div>

        <!-- Aba Início -->
        <div id="home" class="tab-content active">
            <div class="hero">
                <h1>David <span>Dev</span></h1>
                <p>Crio sites, APIs e sistemas personalizados</p>
                
                <!-- Discord -->
                <div class="discord-box" onclick="copiarDiscord()">
                    <span class="discord-icon">💬</span>
                    <span class="discord-name">davidbr08506</span>
                    <span class="discord-copy">clique para copiar</span>
                </div>

                <!-- Serviços -->
                <div class="services">
                    <h3>O que eu faço</h3>
                    <div class="services-grid">
                        <div class="service-item">
                            <div class="service-icon">🌐</div>
                            <span>Sites completos</span>
                        </div>
                        <div class="service-item">
                            <div class="service-icon">⚙️</div>
                            <span>APIs</span>
                        </div>
                        <div class="service-item">
                            <div class="service-icon">🤖</div>
                            <span>Bots</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Aba Projetos -->
        <div id="projects" class="tab-content">
            <h2 style="font-size: 1.4rem; margin-bottom: 15px;">Destaque</h2>
            
            <div class="project-card">
                <div class="project-header">
                    <div class="project-icon">☁️</div>
                    <div class="project-title">CloudVault</div>
                </div>
                <p style="color: #9ca3af; margin-bottom: 12px; font-size: 0.95rem;">
                    Hub de scripts para Roblox com sistema de login e API própria
                </p>
                <div class="project-tech">
                    <span>PHP</span>
                    <span>MySQL</span>
                    <span>HTML/CSS</span>
                    <span>JavaScript</span>
                </div>
                <a href="https://cloudvaultzy.xo.je/" target="_blank" class="project-link">
                    🔗 Acessar projeto →
                </a>
            </div>
        </div>

        <!-- FOOTER CENTRALIZADO -->
        <footer class="footer">
            © 2026 David
        </footer>
    </div>

    <script>
        function openTab(event, tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function copiarDiscord() {
            navigator.clipboard.writeText('davidbr08506').then(() => {
                mostrarToast('✅ Discord copiado');
            });
        }

        function mostrarToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // Tenta tocar música automaticamente
        document.addEventListener('click', function() {
            document.getElementById('bgMusic').play();
        }, { once: true });
    </script>
</body>
</html>
